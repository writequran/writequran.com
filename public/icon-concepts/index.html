<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WriteQuran Icon Concepts</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f2e7;
      color: #2f2a22;
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }
    p {
      margin: 0 0 28px;
      color: #6b6257;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }
    .card {
      background: white;
      border-radius: 28px;
      padding: 18px 18px 22px;
      box-shadow: 0 18px 40px rgba(91, 72, 34, 0.08);
    }
    img {
      display: block;
      width: 100%;
      border-radius: 24px;
      background: #d6c19e;
    }
    h2 {
      margin: 16px 0 6px;
      font-size: 18px;
    }
    .meta {
      color: #8c7e68;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>WriteQuran Icon Concepts</h1>
    <p>Three directions: book-based monogram, pen-and-Q symbol, and a refined wordmark icon.</p>
    <div class="grid">
      <section class="card">
        <img src="./concept-1-wq-book.svg" alt="Concept 1">
        <h2>Concept 1</h2>
        <div class="meta">Open mushaf + WQ monogram</div>
      </section>
      <section class="card">
        <img src="./concept-2-q-pen.svg" alt="Concept 2">
        <h2>Concept 2</h2>
        <div class="meta">Q symbol + pen nib + Quran label</div>
      </section>
      <section class="card">
        <img src="./concept-3-minimal-wordmark.svg" alt="Concept 3">
        <h2>Concept 3</h2>
        <div class="meta">Minimal wordmark with cursor accent</div>
      </section>
    </div>
  </main>
</body>
</html>
